version: 1
disable_existing_loggers: False
formatters:
  default:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  console:
    class: logging.StreamHandler
    formatter: default
loggers:
  app:
    level: INFO
    propagate: true
  uvicorn.error:
    level: INFO
    propagate: false
    handlers:
      - console
  uvicorn.access:
    level: INFO
    propagate: false
    handlers:
      - console
root:
  level: INFO
  handlers:
    - console